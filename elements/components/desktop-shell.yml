id: desktop-shell
version: 0.1.2
about: Desktop shell for rlxos

depends:
  - components/labwc.yml
  - components/cage.yml
  - components/swaybg.yml
  - components/swayidle.yml
  - components/swaylock.yml
  - components/greetd.yml
  - components/gtkgreet.yml
  - components/wmenu.yml
  
  - components/sfwbar.yml
  - components/foot.yml

  - components/fonts/ibm-plex.yml
  - components/fonts/noto.yml
  - components/fonts/noto-cjk.yml
  - components/fonts/noto-emoji.yml
  - components/fonts/adobe-source-code-pro-fonts.yml

  - components/themes/adwaita-icon-theme.yml
  - components/themes/tela-icon-theme.yml
  - components/themes/orchis-gtk-theme.yml

script: |-
  install -v -D -m 0755 /dev/stdin %{install-root}%{libdir}/systemd/systemd-preset << "EOF"
  enable greetd
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/greetd/config.toml << "EOF"
  [terminal]
  vt = 1

  [default_session]
  command = "cage -- /Applications/initial-setup.app"
  user = "initial-setup"
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/greetd/environments << "EOF"
  labwc
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/autostart << "EOF"
  %{bindir}/swaybg -i %{datadir}/backgrounds/default.jpeg >/dev/null 2>&1 &
  %{bindir}/sfwbar >/dev/null 2>&1 &

  %{bindir}/swayidle -w \
    timeout 300 'swaylock -f -c 000000' \
    before-sleep 'swaylock -f -c 000000' >/dev/null 2>&1 &
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/menu.xml << "EOF"
  <?xml version="1.0" encoding="UTF-8"?>
  <openbox_menu>
      <menu id="client-menu">
      <item label="Minimize">
        <action name="Iconify" />
      </item>
      <item label="Maximize">
        <action name="ToggleMaximize" />
      </item>
      <item label="Fullscreen">
        <action name="ToggleFullscreen" />
      </item>
      <item label="Roll up/down">
        <action name="ToggleShade" />
      </item>
      <item label="Decorations">
        <action name="ToggleDecorations" />
      </item>
      <item label="Always on Top">
        <action name="ToggleAlwaysOnTop" />
      </item>

      <menu id="workspaces" label="Workspace">
        <item label="Move left">
          <action name="SendToDesktop" to="left" />
        </item>
        <item label="Move right">
          <action name="SendToDesktop" to="right" />
        </item>
        <separator />
        <item label="Always on Visible Workspace">
          <action name="ToggleOmnipresent" />
        </item>
      </menu>

      <item label="Close">
        <action name="Close" />
      </item>
    </menu>
    <menu id="root-menu">
      <item label="Web browser">
        <action name="Execute" command="firefox" />
      </item>
      <item label="Terminal">
        <action name="Execute" command="foot" />
      </item>
      <item label="Reconfigure">
        <action name="Reconfigure" />
      </item>
      <item label="Exit">
        <action name="Exit" />
      </item>
      <item label="Poweroff">
        <action name="Execute" command="systemctl -i poweroff" />
      </item>
    </menu>

    <menu id="some-custom-menu">
      <item label="Reconfigure">
        <action name="Reconfigure" />
      </item>
      <item label="Exit">
        <action name="Exit" />
      </item>
    </menu>
  </openbox_menu>
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/environment << "EOF"
  MOZ_ENABLE_WAYLAND=1
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/rc.xml << "EOF"
  <?xml version="1.0"?>
  <labwc_config>
    <core>
      <decoration>server</decoration>
      <gap>2</gap>
      <adaptiveSync>no</adaptiveSync>
      <reuseOutputMode>no</reuseOutputMode>
    </core>
    <theme>
        <name>Elegent</name>
        <cornerRadius>8</cornerRadius>
        <animateIconify>yes</animateIconify>
        <dropShadows>yes</dropShadows>
        <font name="sans" size="10"/>
    </theme>
    <windowSwitcher show="yes" preview="no" outlines="no">
      <fields>
        <field content="type" width="25%"/>
        <field content="app_id" width="25%"/>
        <field content="title" width="100%"/>
      </fields>
    </windowSwitcher>
    <resistance>
      <screenEdgeStrength>20</screenEdgeStrength>
    </resistance>
    <focus>
      <followMouse>no</followMouse>
      <followMouseRequiresMovement>yes</followMouseRequiresMovement>
      <raiseOnFocus>no</raiseOnFocus>
    </focus>
    <snapping>
      <range>1</range>
      <topMaximize>yes</topMaximize>
    </snapping>
    <desktops>
      <popupTime>1000</popupTime>
      <names>
        <name>Default</name>
      </names>
    </desktops>
    <keyboard>
        <default />
        <keybind key="W-Return">
          <action name="Execute" command="foot" />
        </keybind>
        <keybind key="W-d">
          <action name="Execute" command="wmenu" />
        </keybind>
    </keyboard>
    <mouse>
        <default/>
        <context name="Root">
            <mousebind button="Right" action="Press">
                <action name="ShowMenu" menu="root-menu"/>
            </mousebind>
        </context>
    </mouse>
  </labwc_config>
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{datadir}/sfwbar/sfwbar.config << "EOF"
  theme = "Orchis-Light"
  IconTheme = "Tela-light"
  Set Term = "foot"

  function("SfwbarInit") {
    SetBarId "bar-0"
    SetLayer "top"
  }

  include("winops.widget")

  layout "sfwbar" {
    include("startmenu.widget")

    button {
      style = "launcher"
      value = $Term
      action = Exec $Term
    }

    taskbar {
      rows = 1
      group = true
      icons = true
      labels = true
      actions[3] = Menu "winops"
    }
    
    label { css = "* { -GtkWidget-hexpand: true; min-height: 30x; }" }

    include ("battery-svg.widget")

    label {
      value = Time("%k:%M")
      style = "clock"
    }

    #CSS
    @define-color lab_bg_color RGBA(0, 0, 0, 0.85);
    @define-color lab_active_color #bc4b4f;
    @define-color lab_hover_color RGBA(255, 255, 255, 0.1);
    @define-color lab_text_color #d1d1d1;
    @define-color lab_menu_bg_color #353535;

    window {
      -GtkWidget-direction: bottom;
      background-color: @lab_bg_color;
    }

    label {
      font-size: 14px;
      color: @lab_text_color;
      text-shadow: none;
    }

    button,
    button image {
      outline-style: none;
      box-shadow: none;
      background-image: none;
      border-image: none;
      border-radius: 0;
      min-height: 30px;
      min-width: 30px;
      margin: 0px;
      margin-right: 3px;
      border: 0px;
      background-color: RGBA(0, 0, 0, 0.0);
      -GtkWidget-valign: center;
    }

    button:hover {
      background-color: @lab_hover_color;
    }

    button#taskbar_group_normal,
    button#taskbar_group_normal:hover,
    button#taskbar_group_active {
      border: 0px;
      -GtkWidget-valign: center;
    }

    button#taskbar_group_active {
      background-color: @lab_active_color;
    }

    button#taskbar_group_active:hover {
      background-color: @lab_hover_color;
    }

    #menu_item,
    #menu_item *,
    #menu_item image,
    #menu_item label {
      -GtkWidget-halign: start;
      color: white;
    }

    #menu_item image {
      min-width: 16px;
      min-height: 16px;
      padding-right: 2px;
      margin-right: 7px;
      margin-left: 3px;
    }

    menu {
      background-color: @lab_menu_bg_color;
    }

    menu arrow {
      background: none;
    }

    label#clock {
      color: @lab_text_color;
      -GtkWidget-vexpand: true;
      -GtkWidget-valign: center;
      font-size: 18px;
      margin-right: 8px;
    }
  }
  EOF

  install -v -D -m 0644 /files/backgrounds/default.jpeg %{install-root}%{datadir}/backgrounds/default.jpeg

  install -v -D -m 0644 /dev/stdin %{install-root}%{sysconfdir}/gtk-3.0/settings.ini << "EOF"
  [Settings]
  gtk-icon-theme-name = Tela-light
  gtk-theme-name = Orchis-Light
  gtk-font-name = IBM Plex Sans 12
  EOF