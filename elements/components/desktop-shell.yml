id: desktop-shell
version: 0.1.1
about: Desktop shell for rlxos

depends:
  - components/labwc.yml
  - components/cage.yml
  - components/swaybg.yml
  - components/swayidle.yml
  - components/swaylock.yml
  - components/greetd.yml
  - components/gtkgreet.yml
  - components/wmenu.yml
  - components/sfwbar.yml
  - components/foot.yml
  - components/fonts/ibm-plex.yml
  - components/fonts/noto.yml
  - components/fonts/noto-cjk.yml
  - components/fonts/noto-emoji.yml
  - components/fonts/adobe-source-code-pro-fonts.yml

script: |-
  install -v -D -m 0755 /dev/stdin %{install-root}%{libdir}/systemd/systemd-preset << "EOF"
  enable greetd
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/greetd/config.toml << "EOF"
  [terminal]
  vt = 1

  [default_session]
  command = "cage gtkgreet"
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/greetd/environments << "EOF"
  labwc
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/autostart << "EOF"
  %{bindir}/swaybg -c '#113344' >/dev/null 2>&1 &
  %{bindir}/sfwbar >/dev/null 2>&1 &

  %{bindir}/swayidle -w \
    timeout 300 'swaylock -f -c 000000' \
    before-sleep 'swaylock -f -c 000000' >/dev/null 2>&1 &
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/menu.xml << "EOF"
  <?xml version="1.0" encoding="UTF-8"?>
  <openbox_menu>
      <menu id="client-menu">
      <item label="Minimize">
        <action name="Iconify" />
      </item>
      <item label="Maximize">
        <action name="ToggleMaximize" />
      </item>
      <item label="Fullscreen">
        <action name="ToggleFullscreen" />
      </item>
      <item label="Roll up/down">
        <action name="ToggleShade" />
      </item>
      <item label="Decorations">
        <action name="ToggleDecorations" />
      </item>
      <item label="Always on Top">
        <action name="ToggleAlwaysOnTop" />
      </item>

      <menu id="workspaces" label="Workspace">
        <item label="Move left">
          <action name="SendToDesktop" to="left" />
        </item>
        <item label="Move right">
          <action name="SendToDesktop" to="right" />
        </item>
        <separator />
        <item label="Always on Visible Workspace">
          <action name="ToggleOmnipresent" />
        </item>
      </menu>

      <item label="Close">
        <action name="Close" />
      </item>
    </menu>
    <menu id="root-menu">
      <item label="Web browser">
        <action name="Execute" command="firefox" />
      </item>
      <item label="Terminal">
        <action name="Execute" command="foot" />
      </item>
      <item label="Reconfigure">
        <action name="Reconfigure" />
      </item>
      <item label="Exit">
        <action name="Exit" />
      </item>
      <item label="Poweroff">
        <action name="Execute" command="systemctl -i poweroff" />
      </item>
    </menu>

    <menu id="some-custom-menu">
      <item label="Reconfigure">
        <action name="Reconfigure" />
      </item>
      <item label="Exit">
        <action name="Exit" />
      </item>
    </menu>
  </openbox_menu>
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/environment << "EOF"
  MOZ_ENABLE_WAYLAND=1
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/rc.xml << "EOF"
  <?xml version="1.0"?>
  <labwc_config>
    <core>
      <decoration>server</decoration>
      <gap>2</gap>
      <adaptiveSync>no</adaptiveSync>
      <reuseOutputMode>no</reuseOutputMode>
    </core>
    <theme>
        <name>Elegent</name>
        <cornerRadius>8</cornerRadius>
        <animateIconify>yes</animateIconify>
        <dropShadows>yes</dropShadows>
        <font name="sans" size="10"/>
    </theme>
    <windowSwitcher show="yes" preview="no" outlines="no">
      <fields>
        <field content="type" width="25%"/>
        <field content="app_id" width="25%"/>
        <field content="title" width="100%"/>
      </fields>
    </windowSwitcher>
    <resistance>
      <screenEdgeStrength>20</screenEdgeStrength>
    </resistance>
    <focus>
      <followMouse>no</followMouse>
      <followMouseRequiresMovement>yes</followMouseRequiresMovement>
      <raiseOnFocus>no</raiseOnFocus>
    </focus>
    <snapping>
      <range>1</range>
      <topMaximize>yes</topMaximize>
    </snapping>
    <desktops>
      <popupTime>1000</popupTime>
      <names>
        <name>Default</name>
      </names>
    </desktops>
    <keyboard>
        <default />
        <keybind key="W-Return">
          <action name="Execute" command="foot" />
        </keybind>
        <keybind key="W-d">
          <action name="Execute" command="wmenu" />
        </keybind>
    </keyboard>
    <mouse>
        <default/>
        <context name="Root">
            <mousebind button="Right" action="Press">
                <action name="ShowMenu" menu="root-menu"/>
            </mousebind>
        </context>
    </mouse>
  </labwc_config>
  EOF
