id: desktop-shell
version: 0.1.1
about: Desktop shell for rlxos

depends:
  - components/labwc.yml
  - components/cage.yml
  - components/swaybg.yml
  - components/swayidle.yml
  - components/swaylock.yml
  - components/greetd.yml
  - components/gtkgreet.yml
  - components/wmenu.yml
  
  - components/sfwbar.yml
  - components/foot.yml

  - components/fonts/ibm-plex.yml
  - components/fonts/noto.yml
  - components/fonts/noto-cjk.yml
  - components/fonts/noto-emoji.yml
  - components/fonts/adobe-source-code-pro-fonts.yml

  - components/themes/adwaita-icon-theme.yml
  - components/themes/tela-icon-theme.yml
  - components/themes/orchis-gtk-theme.yml

script: |-
  install -v -D -m 0755 /dev/stdin %{install-root}%{libdir}/systemd/systemd-preset << "EOF"
  enable greetd
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/greetd/config.toml << "EOF"
  [terminal]
  vt = 1

  [default_session]
  command = "cage -- /Applications/initial-setup.app"
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/greetd/environments << "EOF"
  labwc
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/autostart << "EOF"
  %{bindir}/swaybg -c '#113344' >/dev/null 2>&1 &
  %{bindir}/sfwbar >/dev/null 2>&1 &

  %{bindir}/swayidle -w \
    timeout 300 'swaylock -f -c 000000' \
    before-sleep 'swaylock -f -c 000000' >/dev/null 2>&1 &
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/menu.xml << "EOF"
  <?xml version="1.0" encoding="UTF-8"?>
  <openbox_menu>
      <menu id="client-menu">
      <item label="Minimize">
        <action name="Iconify" />
      </item>
      <item label="Maximize">
        <action name="ToggleMaximize" />
      </item>
      <item label="Fullscreen">
        <action name="ToggleFullscreen" />
      </item>
      <item label="Roll up/down">
        <action name="ToggleShade" />
      </item>
      <item label="Decorations">
        <action name="ToggleDecorations" />
      </item>
      <item label="Always on Top">
        <action name="ToggleAlwaysOnTop" />
      </item>

      <menu id="workspaces" label="Workspace">
        <item label="Move left">
          <action name="SendToDesktop" to="left" />
        </item>
        <item label="Move right">
          <action name="SendToDesktop" to="right" />
        </item>
        <separator />
        <item label="Always on Visible Workspace">
          <action name="ToggleOmnipresent" />
        </item>
      </menu>

      <item label="Close">
        <action name="Close" />
      </item>
    </menu>
    <menu id="root-menu">
      <item label="Web browser">
        <action name="Execute" command="firefox" />
      </item>
      <item label="Terminal">
        <action name="Execute" command="foot" />
      </item>
      <item label="Reconfigure">
        <action name="Reconfigure" />
      </item>
      <item label="Exit">
        <action name="Exit" />
      </item>
      <item label="Poweroff">
        <action name="Execute" command="systemctl -i poweroff" />
      </item>
    </menu>

    <menu id="some-custom-menu">
      <item label="Reconfigure">
        <action name="Reconfigure" />
      </item>
      <item label="Exit">
        <action name="Exit" />
      </item>
    </menu>
  </openbox_menu>
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/environment << "EOF"
  MOZ_ENABLE_WAYLAND=1
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/xdg/labwc/rc.xml << "EOF"
  <?xml version="1.0"?>
  <labwc_config>
    <core>
      <decoration>server</decoration>
      <gap>2</gap>
      <adaptiveSync>no</adaptiveSync>
      <reuseOutputMode>no</reuseOutputMode>
    </core>
    <theme>
        <name>Elegent</name>
        <cornerRadius>8</cornerRadius>
        <animateIconify>yes</animateIconify>
        <dropShadows>yes</dropShadows>
        <font name="sans" size="10"/>
    </theme>
    <windowSwitcher show="yes" preview="no" outlines="no">
      <fields>
        <field content="type" width="25%"/>
        <field content="app_id" width="25%"/>
        <field content="title" width="100%"/>
      </fields>
    </windowSwitcher>
    <resistance>
      <screenEdgeStrength>20</screenEdgeStrength>
    </resistance>
    <focus>
      <followMouse>no</followMouse>
      <followMouseRequiresMovement>yes</followMouseRequiresMovement>
      <raiseOnFocus>no</raiseOnFocus>
    </focus>
    <snapping>
      <range>1</range>
      <topMaximize>yes</topMaximize>
    </snapping>
    <desktops>
      <popupTime>1000</popupTime>
      <names>
        <name>Default</name>
      </names>
    </desktops>
    <keyboard>
        <default />
        <keybind key="W-Return">
          <action name="Execute" command="foot" />
        </keybind>
        <keybind key="W-d">
          <action name="Execute" command="wmenu" />
        </keybind>
    </keyboard>
    <mouse>
        <default/>
        <context name="Root">
            <mousebind button="Right" action="Press">
                <action name="ShowMenu" menu="root-menu"/>
            </mousebind>
        </context>
    </mouse>
  </labwc_config>
  EOF

  install -v -D -m 0755 /dev/stdin %{install-root}%{sysconfdir}/sfwbar/sfwbar.config << "EOF"
  theme = "Orchis-Light"
  IconTheme = "Tela-light"

  # Display minimized windows on taskbars across all outputs
  # DisownMinimized = true

  # Select terminal emulator to use
  Set Term = "foots"

  TriggerAction "SIGRTMIN+1", SwitcherEvent "forward"
  TriggerAction "SIGRTMIN+2", SwitcherEvent "back"

  Function("SfwbarInit") {
    SetMirror "*"
  #  Config "PopUp 'XVolumeWindow' { AutoClose = true }"
  #  SetBarSensor "1000"
  }

  # Window Placer
  placer {
    xorigin = 5  # place the first window at X% from the left
    yorigin = 5  # place the first window at X% from the top
    xstep = 5    # step by X% of desktop horizontally
    ystep = 5    # step by X% of desktop vertically
    children = true
  }

  # Task Switcher
  switcher {
    interval = 700
    icons = true
    labels = false
    cols = 5
  }

  include("winops.widget")

  layout {
    size = "100%"
    layer = "top"
    exclusive_zone = "auto"
    css = "* { min-height: 20px }"

    include("startmenu.widget")

    taskbar {
      style = "taskbar"
      rows = 1;
      icons = true;
      labels = true;
      sort = false;
  #    filter = workspace;
      action[3] = Menu "winops"
      action[Drag] = Focus
    }

    label {
      css = "* { -GtkWidget-hexpand: true; }"
    }

    pager {
      style = "pager"
      rows = 1
      pins = "1","2","3","4"
      preview = true
      action[Drag] = WorkspaceActivate
    }

    include("cpu.widget")
    include("memory.widget")

    tray {
      rows = 1
    }

    include("battery-svg.widget")
    include("bluez.widget")
  # include("idle.widget")
  # include("rfkill-wifi.widget")
  # include("rfkill-bt.widget")
    include("network-module.widget")
    include("volume.widget")
    include("mpd-intmod.widget")
    include("sway-lang.widget")

    grid {
      css = "* { -GtkWidget-direction: bottom; }"
      label {
        value = Time("%k:%M")
        style ="clock"
      }
      label {
        value = Time("%x")
        style ="clock"
      }
    }
  }

  #CSS
  #hidden {
    -GtkWidget-visible: false;
  }

  button,
  button image {
    outline-style: none;
    box-shadow: none;
    background-image: none;
    border-image: none;
  }

  label {
    font: 14px Sans;
  }

  image {
    -ScaleImage-symbolic: true;
  }

  button#startmenu,
  button#module {
    border: none;
    padding: 3px;
    margin: 0px;
    -GtkWidget-vexpand: true;
  }

  button#startmenu image,
  button#module image {
    min-height: 32px;
    min-width: 32px;
    padding: 2px 4px;
    margin: 0px;
    -GtkWidget-valign: center;
    -GtkWidget-vexpand: true;
  }

  button#taskbar_normal,
  button#taskbar_active,
  button#taskbar_normal:hover {
    padding: 3px;
    border-radius: 3px;
    border-width: 0px;
    -GtkWidget-hexpand: false;
  }

  grid#taskbar > :not(:last-child) button#taskbar_normal:hover,
  grid#taskbar > :not(:last-child) button#taskbar_active,
  grid#taskbar > :not(:last-child) button#taskbar_normal {
    border-radius: 0px;
    border-right: 1px solid alpha(@theme_fg_color,0.15);
  }

  button#taskbar_active {
    background-color: rgba(199,227,255,0.6);
  }

  button#taskbar_normal:hover {
    background-color: rgba(213,213,213,0.6);
  }

  button#taskbar_normal grid,
  button#taskbar_active grid,
  button#taskbar_normal:hover grid {
    -GtkWidget-valign: center;
  }

  button#taskbar_normal image,
  button#taskbar_active image,
  button#taskbar_normal:hover image {
    min-width: 20px;
    min-height: 20px;
    padding-right: 6px;
    -ScaleImage-symbolic: false;
  }

  button#taskbar_normal label,
  button#taskbar_active label,
  button#taskbar_normal:hover label {
  }

  button#tray_active,
  button#tray_passive,
  button#tray_attention {
    margin: 0px;
    border: none;
    padding: 0px;
  }

  button#tray_passive {
    -GtkWidget-visible: false;
  }

  button#tray_active image,
  button#tray_passive image,
  button#tray_attention image {
    -GtkWidget-valign: center;
    -GtkWidget-vexpand: true;
    min-height: 16px;
    min-width: 16px;
    padding: 3px;
    margin: 0px;
    border: none;
  }

  grid#pager {
    border-radius: 3px;
    border-color: @theme_fg_color;
    border-style: solid;
    border-width: 1px;
    margin: 2px;
    padding: 0px;
  }

  button#pager_normal,
  button#pager_visible,
  button#pager_focused {
    border-radius: 5px;
    border: none;
    outline: 0px;
    margin-right: 2px;
    margin-left: 2px;
    padding: 0px;
    -GtkWidget-halign: center;
    -GtkWidget-valign: center;
  }

  button#pager_focused {
    background-color: rgba(199,227,255,0.6);
  }

  button#pager_preview {
    border-radius: 0;
    border-color: #000000;
    border-width: 0.25mm;
    color: #777777;
    min-width: 5cm;
    min-height: 2.8125cm;
  }

  #menu_item,
  #menu_item image,
  #menu_item label {
    -GtkWidget-halign: start;
  }

  #menu_item image {
    min-width: 16px;
    min-height: 16px;
    padding-right: 2px;
  }

  label#clock {
    padding-left: 2px;
    padding-right: 2px;
    -GtkWidget-vexpand: true;
    -GtkWidget-valign: center;
    font: 10px Sans;
  }

  chart#cpu_chart {
    background: rgba(127,127,127,0.3);
    min-width: 9px;
    -GtkWidget-vexpand: true;
    margin: 2px;
    border: 1px solid @theme_fg_color;
    color: red;
  }

  progressbar#memory {
    -GtkWidget-direction: top;
    -GtkWidget-vexpand: true;
    min-width: 9px;
    border: 1px solid @theme_fg_color;
    margin: 2px;
  }

  progressbar#memory trough {
    min-height: 2px;
    min-width: 9px;
    border: none;
    border-radius: 0px;
    background: rgba(127,127,127,0.3);
  }

  progressbar#memory progress {
    -GtkWidget-hexpand: true;
    min-width: 9px;
    border-radius: 0px;
    border: none;
    margin: 0px;
    background-color: alpha(green,0.9);
  }

  grid#switcher_active image,
  grid#switcher_active {
    background-color: #bbddff;
  }

  grid#switcher_active image,
  grid#switcher_active,
  grid#switcher_normal image,
  grid#switcher_normal {
    min-width: 50px;
    min-height: 50px;
    border-radius: 5px;
    padding: 5px;
    -GtkWidget-direction: right;
    -GtkWidget-hexpand: true;
    -ScaleImage-symbolic: false;
  }

  window#switcher { 
    border: 1px solid @borders;
    border-radius: 6px; 
    padding: 60px; 
    -GtkWidget-hexpand: true;
  }

  grid#switcher { 
    border-radius: 5px;
    padding: 5px;
    -GtkWidget-hexpand: true;
  }

  label#sway_lang {
    margin-left: 3px;
    margin-right: 5px;
  }
  EOF
