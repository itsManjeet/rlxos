id: pkgupd
version: 1.0.0
about: Package Management and Updater Daemon
merge: [ elements/include/rlxos.inc, channel.yml ]

depends:
  - components/glibc.yml
  - components/libyaml-cpp.yml
  - components/curl.yml

build-depends:
  - components/git.yml

post-script: |-
  install -vDm 0644 /dev/stdin %{install-root}%{sysconfdir}/pkgupd.yml << "EOF"
  version: %{channel}
  EOF
