name: rlxos
min-version: 2.0
element-path: elements
ref-storage: inline


sandbox:
  build-arch: '%{arch}'

(@):
- freedesktop-sdk.bst:include/runtime.yml
- include/aliases.yml
- include/shell.yml
- include/options.yml
- include/environment.yml
- include/overrides.yml
- include/split-rules.yml
- include/variables.yml
- include/artifacts.yml

plugins:
- origin: junction
  junction: plugins/buildstream-plugins.bst
  elements:
    - autotools
    - meson
    - pip
    - cmake
    - make
  sources:
    - cargo
    - patch

- origin: junction
  junction: plugins/bst-plugins-experimental.bst
  elements:
    - collect_manifest
  sources:
    - git_tag
    - git_module
    - zip

- origin: local
  path: plugins
  elements:
    - collect_initial_scripts
    - ostree
  sources:
    - go-vendor
    - cargo-lock